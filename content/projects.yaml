  - id: anxious-websites
    title: anxious websites
    cover: /images/anxious/0322.gif
    description: A series of websites exploring connections and social feelings through digital interfaces and interaction patterns
    category: interactive
    writeup: |
      A series of websites that explore connections, social feelings, and the emotional dimensions of digital interaction. "Anxious websites" is more of a general name - the work examines how we relate to others and ourselves through technology.

      The project explores how digital interfaces can communicate emotional states and make invisible feelings tangible through interaction. Using ASCII art, animated elements, and responsive behaviors, the websites create digital spaces that feel emotionally charged and socially aware.

      Features include fish that swim across dark and light themes, boolean logic prompts that question connection and isolation ("are we always already connected, even when we think we're alone?"), and interfaces that respond to user presence with emotional sensitivity. The work examines how we project human emotions onto digital environments and how technology can serve as a medium for exploring our social and emotional lives.

    process_images:
      - /images/anxious/ascii-fish-dark-theme.png
      - /images/anxious/ascii-fish-light-theme.png
